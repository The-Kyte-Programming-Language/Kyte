name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LLVM_VERSION: "21"

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-gnu' || '' }}
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── LLVM 설치 (3개 플랫폼 통합) ──
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Set LLVM_SYS_211_PREFIX
        shell: bash
        run: echo "LLVM_SYS_211_PREFIX=$LLVM_PATH" >> $GITHUB_ENV

      # Windows GNU 타겟용 MinGW 툴체인 설치
      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      # ── 빌드 & 검사 ──
      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lint
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cargo clippy --target x86_64-pc-windows-gnu -- -D warnings
          else
            cargo clippy -- -D warnings
          fi
        shell: bash

      - name: Build
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cargo build --release --target x86_64-pc-windows-gnu
          else
            cargo build --release
          fi
        shell: bash

      - name: Run built-in tests
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cargo run --release --target x86_64-pc-windows-gnu -- test
          else
            cargo run --release -- test
          fi
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension deps
        working-directory: editors/vscode
        run: npm ci --ignore-scripts || npm install

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kyte-${{ runner.os }}
          path: |
            target/release/kyte
            target/x86_64-pc-windows-gnu/release/kyte.exe
          if-no-files-found: ignore