name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LLVM_VERSION: "21"

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # 1. Rust 툴체인 설정 (Windows는 GNU 타겟 추가)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-gnu' || '' }}
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── LLVM 설치 (Linux) ──
      - name: Install LLVM (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg ca-certificates lsb-release
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-${{ env.LLVM_VERSION }}-dev libpolly-${{ env.LLVM_VERSION }}-dev clang-${{ env.LLVM_VERSION }}
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-${{ env.LLVM_VERSION }}" >> $GITHUB_ENV

      # ── LLVM 설치 (macOS) ──
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@${{ env.LLVM_VERSION }}
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@${{ env.LLVM_VERSION }})" >> $GITHUB_ENV
          echo "$(brew --prefix llvm@${{ env.LLVM_VERSION }})/bin" >> $GITHUB_PATH

      # ── LLVM 설치 (Windows / MSYS2) ──
      - name: Setup MSYS2 and Install LLVM (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-llvm
          cache: true # MSYS2 자체 캐시 활성화

      - name: Set LLVM Env (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # MSYS2 MinGW64 경로 설정 (공백 없음, llvm-config 포함)
          $llvmPath = "C:\msys64\mingw64"
          echo "LLVM_SYS_211_PREFIX=$llvmPath" >> $env:GITHUB_ENV
          echo "$llvmPath\bin" >> $env:GITHUB_PATH

      # ── 빌드 & 검사 ──
      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lint
        # Windows는 GNU 타겟으로 린트 실행
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cargo clippy --target x86_64-pc-windows-gnu -- -D warnings
          else
            cargo clippy -- -D warnings
          fi
        shell: bash

      - name: Build
        # Windows는 GNU 타겟으로 빌드
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cargo build --release --target x86_64-pc-windows-gnu
          else
            cargo build --release
          fi
        shell: bash

      - name: Run built-in tests
        # Windows는 빌드된 gnu 바이너리 실행
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cargo run --release --target x86_64-pc-windows-gnu -- test
          else
            cargo run --release -- test
          fi
        shell: bash

      # ── VS Code 확장 ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension deps
        working-directory: editors/vscode
        run: npm ci --ignore-scripts || npm install

      # ── 아티팩트 업로드 ──
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kyte-${{ runner.os }}
          path: |
            target/release/kyte
            target/x86_64-pc-windows-gnu/release/kyte.exe
          if-no-files-found: ignore